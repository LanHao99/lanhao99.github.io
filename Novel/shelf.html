<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="LanHao Novel 书架：沉浸式书籍轮播展示。" />
    <title>LanHao Novel - 书架</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Noto+Serif+SC:wght@500;700&display=swap"
        rel="stylesheet" />
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            color: #fff;
            font-family: "Manrope", "Segoe UI", sans-serif;
            overflow: hidden;
            background: #0a0a0a;
        }

        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.08;
            background-image:
                repeating-linear-gradient(120deg,
                    rgba(255, 255, 255, 0.06) 0,
                    rgba(255, 255, 255, 0.06) 1px,
                    transparent 1px,
                    transparent 4px);
            mix-blend-mode: multiply;
            z-index: 20;
        }

        .carousel-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
            display: flex;
            align-items: flex-end;
        }

        .carousel-slide.active {
            opacity: 1;
        }

        .slide-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .slide-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top,
                    rgba(0, 0, 0, 0.7),
                    rgba(0, 0, 0, 0.4) 35%,
                    rgba(0, 0, 0, 0.15) 65%,
                    transparent 100%);
            pointer-events: none;
        }

        .slide-content {
            position: relative;
            z-index: 5;
            padding: 50px;
            backdrop-filter: blur(16px);
            background: rgba(20, 20, 25, 0.65);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px 20px 0 0;
            max-width: 600px;
            width: 100%;
            animation: slideIn 0.6s ease 0.15s both;
        }

        @keyframes slideIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .slide-content h2 {
            margin: 0 0 16px 0;
            font-family: "Noto Serif SC", serif;
            font-size: 2.8rem;
            color: #fff;
            text-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            letter-spacing: 0.02em;
        }

        .slide-content p {
            margin: 0;
            color: #d0d0d0;
            line-height: 1.8;
            font-size: 1.05rem;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .topbar {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 25;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            padding: 10px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateX(-2px);
        }

        .carousel-nav {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25;
            display: flex;
            gap: 14px;
            padding: 14px 24px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .carousel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .carousel-dot:hover {
            background: rgba(255, 255, 255, 0.6);
            transform: scale(1.2);
        }

        .carousel-dot.active {
            background: #fff;
            transform: scale(1.5);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
        }

        .scroll-hint {
            position: fixed;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            text-align: center;
            animation: fadeInOut 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes fadeInOut {

            0%,
            10%,
            90%,
            100% {
                opacity: 0;
            }

            50% {
                opacity: 1;
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(-8px);
            }
        }

        .scroll-hint {
            animation: fadeInOut 3s ease-in-out infinite, float 2.5s ease-in-out infinite;
        }
    </style>
</head>

<body>
    <div class="grain" aria-hidden="true"></div>
    <div class="carousel-wrapper">
        <div class="carousel" id="carousel"></div>
        <div class="carousel-nav" id="carousel-nav"></div>
        <div class="scroll-hint">向下滚动或触摸切换</div>
        <div class="topbar">
            <a class="back-btn" href="./index.html">← 返回</a>
        </div>
    </div>

    <script>
        const BOOKS = [
            {
                title: '雾港回声',
                desc: '近未来城市悬疑。每章末尾保留线索索引，适合做互动阅读实验。事物的发展往往超出预期，欢迎进入这个充满转折的故事。',
                color1: '#1a3a5a',
                color2: '#2a6f9f',
                accent: '#5adfff',
                id: 'wugang'
            },
            {
                title: '赤砂天穹',
                desc: '沙海远征题材。可扩展地理设定、阵营关系、关键遗物图鉴。在广阔的沙漠中，每一粒沙都可能述说一段古老的传说。',
                color1: '#6f3f1f',
                color2: '#bf7f3f',
                accent: '#ffc080',
                id: 'chisha'
            },
            {
                title: '十七号月台',
                desc: '都市奇幻短篇集。适合按"时间线 + 角色视角"双索引展示。在这个魔幻与现实交织的城市，每个月台都是一个新的故事的开始。',
                color1: '#3f1f6f',
                color2: '#7f4fbf',
                accent: '#d0a8ff',
                id: 'yueai'
            }
        ];

        class NovelCarousel {
            constructor() {
                this.currentIndex = 0;
                this.carousel = document.getElementById('carousel');
                this.nav = document.getElementById('carousel-nav');
                this.isScrolling = false;
                this.animationFrame = null;
                this.init();
            }

            init() {
                this.createSlides();
                this.createNav();
                this.attachEventListeners();
                setTimeout(() => this.updateEffects(), 100);
            }

            createSlides() {
                BOOKS.forEach((book, idx) => {
                    const slide = document.createElement('div');
                    slide.className = 'carousel-slide' + (idx === 0 ? ' active' : '');
                    slide.innerHTML = `
            <canvas class="slide-canvas" data-index="${idx}"></canvas>
            <div class="slide-overlay"></div>
            <div class="slide-content">
              <h2>${book.title}</h2>
              <p>${book.desc}</p>
            </div>
          `;
                    this.carousel.appendChild(slide);
                });
            }

            createNav() {
                BOOKS.forEach((_, idx) => {
                    const dot = document.createElement('div');
                    dot.className = 'carousel-dot' + (idx === 0 ? ' active' : '');
                    dot.addEventListener('click', () => this.goToSlide(idx));
                    this.nav.appendChild(dot);
                });
            }

            attachEventListeners() {
                document.addEventListener('wheel', (e) => {
                    if (this.isScrolling) return;
                    e.preventDefault();
                    const direction = e.deltaY > 0 ? 1 : -1;
                    this.changeSlide(direction);
                }, { passive: false });

                let touchStart = 0;
                document.addEventListener('touchstart', (e) => {
                    touchStart = e.touches[0].clientY;
                });
                document.addEventListener('touchend', (e) => {
                    const touchEnd = e.changedTouches[0].clientY;
                    const diff = Math.abs(touchStart - touchEnd);
                    if (diff > 50) {
                        const direction = touchStart > touchEnd ? 1 : -1;
                        this.changeSlide(direction);
                    }
                });

                window.addEventListener('resize', () => this.updateEffects());
            }

            changeSlide(direction) {
                if (this.isScrolling) return;
                this.isScrolling = true;

                let newIndex = this.currentIndex + direction;
                if (newIndex < 0) newIndex = BOOKS.length - 1;
                if (newIndex >= BOOKS.length) newIndex = 0;

                this.goToSlide(newIndex);
                setTimeout(() => { this.isScrolling = false; }, 800);
            }

            goToSlide(index) {
                document.querySelectorAll('.carousel-slide').forEach((slide, idx) => {
                    slide.classList.toggle('active', idx === index);
                });

                document.querySelectorAll('.carousel-dot').forEach((dot, idx) => {
                    dot.classList.toggle('active', idx === index);
                });

                this.currentIndex = index;
                this.updateEffects();
            }

            updateEffects() {
                const slides = document.querySelectorAll('.carousel-slide');
                slides.forEach((slide, idx) => {
                    const canvas = slide.querySelector('canvas');
                    if (!canvas) return;

                    if (idx === this.currentIndex) {
                        this.drawEffect(canvas, BOOKS[idx]);
                    }
                });
            }

            drawEffect(canvas, book) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const ctx = canvas.getContext('2d');

                // 背景渐变
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, book.color1);
                gradient.addColorStop(0.5, book.color2);
                gradient.addColorStop(1, book.color1);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // 绘制所有特效
                this.drawAnimatedParticles(ctx, canvas.width, canvas.height, book);
                this.drawWaterRipples(ctx, canvas.width, canvas.height, book);
                this.drawRGBGlitch(ctx, canvas.width, canvas.height);
                this.drawWaterDroplets(ctx, canvas.width, canvas.height, book);
                this.drawLightRays(ctx, canvas.width, canvas.height, book);
            }

            drawAnimatedParticles(ctx, w, h, book) {
                ctx.globalCompositeOperation = 'lighter';
                const particleCount = 80;

                for (let i = 0; i < particleCount; i++) {
                    const x = Math.random() * w;
                    const y = Math.random() * h;
                    const size = Math.random() * 4 + 0.5;
                    const opacity = Math.random() * 0.8 + 0.2;

                    ctx.fillStyle = `rgba(${this.hexToRgb(book.accent).join(',')},${opacity})`;
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fill();

                    // 绘制光晕
                    ctx.strokeStyle = `rgba(${this.hexToRgb(book.accent).join(',')},${opacity * 0.5})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(x, y, size * 1.5, 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.globalCompositeOperation = 'source-over';
            }

            drawWaterRipples(ctx, w, h, book) {
                ctx.strokeStyle = `rgba(${this.hexToRgb(book.accent).join(',')},0.2)`;
                ctx.lineWidth = 2;

                const centerX = w * 0.3 + Math.sin(Date.now() / 2000) * w * 0.1;
                const centerY = h * 0.5 + Math.cos(Date.now() / 3000) * h * 0.1;
                const maxRadius = Math.max(w, h) * 0.8;

                for (let r = 20; r < maxRadius; r += 40) {
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            drawRGBGlitch(ctx, w, h) {
                const imageData = ctx.getImageData(0, 0, w, h);
                const data = imageData.data;
                const glitchAmount = 0.08;

                for (let i = 0; i < data.length; i += 4) {
                    if (Math.random() < glitchAmount) {
                        const channel = Math.floor(Math.random() * 3);
                        const shift = Math.floor(Math.random() * 20) - 10;

                        if (channel === 0) data[i] = Math.max(0, Math.min(255, data[i] + shift));
                        else if (channel === 1) data[i + 1] = Math.max(0, Math.min(255, data[i + 1] + shift));
                        else data[i + 2] = Math.max(0, Math.min(255, data[i + 2] + shift));
                    }
                }

                ctx.putImageData(imageData, 0, 0);
            }

            drawWaterDroplets(ctx, w, h, book) {
                ctx.strokeStyle = `rgba(${this.hexToRgb(book.accent).join(',')},0.35)`;
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                const dropletCount = 25;
                for (let i = 0; i < dropletCount; i++) {
                    const x = Math.random() * w;
                    const y = Math.random() * h;
                    const size = Math.random() * 12 + 4;

                    // 绘制水滴形状
                    ctx.beginPath();
                    ctx.arc(x, y - size * 0.5, size * 0.7, Math.PI * 0.1, Math.PI * 0.9, false);
                    ctx.lineTo(x, y + size);
                    ctx.closePath();
                    ctx.stroke();

                    // 内部亮线
                    ctx.strokeStyle = `rgba(${this.hexToRgb(book.accent).join(',')},0.15)`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(x - size * 0.2, y - size * 0.2, size * 0.3, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            drawLightRays(ctx, w, h, book) {
                ctx.strokeStyle = `rgba(${this.hexToRgb(book.accent).join(',')},0.15)`;
                ctx.lineWidth = 1.5;

                const rayCount = 12;
                const centerX = w * 0.5;
                const centerY = h * 0.3;

                for (let i = 0; i < rayCount; i++) {
                    const angle = (i / rayCount) * Math.PI * 2;
                    const x1 = centerX + Math.cos(angle) * 50;
                    const y1 = centerY + Math.sin(angle) * 50;
                    const x2 = centerX + Math.cos(angle) * (h * 0.6);
                    const y2 = centerY + Math.sin(angle) * (h * 0.6);

                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            }

            hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? [
                    parseInt(result[1], 16),
                    parseInt(result[2], 16),
                    parseInt(result[3], 16)
                ] : [255, 255, 255];
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new NovelCarousel();
        });
    </script>
</body>

</html>
