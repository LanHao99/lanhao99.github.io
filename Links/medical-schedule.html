            { date: '2026-06-04', start: '13:30', end: '17:30', title: '外科学总论', room: '新华临床-外科楼-519' },
            { date: '2026-06-05', start: '08:00', end: '10:20', title: '循证临床实践', room: '08号楼-03层-319教室' },
            { date: '2026-06-05', start: '13:30', end: '16:40', title: '外科学总论', room: '新华临床-外总病区5' },
            { date: '2026-06-09', start: '08:50', end: '12:00', title: '外科手术学', room: '11号楼-B1层-动物手术室' },
            { date: '2026-06-09', start: '13:30', end: '18:20', title: '外科手术学', room: '11号楼-B1层-动物手术室' },
            { date: '2026-06-10', start: '08:00', end: '09:30', title: '全科医学', room: '08号楼-03层-319教室' },
            { date: '2026-06-10', start: '13:30', end: '16:40', title: '功能学实验（A类）', room: '07号楼-04层-407实验室' },
            { date: '2026-06-12', start: '15:10', end: '17:30', title: '外科学总论', room: '瑞金临床-外总临床病区1' },
            { date: '2026-06-17', start: '13:30', end: '17:30', title: '功能学实验（A类）', room: '07号楼-04层-407实验室' },
            { date: '2026-06-18', start: '13:30', end: '15:50', title: '外科学总论', room: '08号楼-03层-319教室' },

            { date: '2026-06-24', start: '13:30', end: '17:30', title: '功能学实验（A类）', room: '07号楼-04层-407实验室' },
            { date: '2026-06-25', start: '08:50', end: '12:00', title: '外科手术学', room: '11号楼-B1层-动物手术室' },

        // 颜色生成器
        const getCourseColors = (title) => {
            const colors = {

                '血液系统': { bg: 'bg-red-100', text: 'text-red-800', border: 'border-red-200' },

                '内分泌系统': { bg: 'bg-purple-100', text: 'text-purple-800', border: 'border-purple-200' },
                '呼吸系统': { bg: 'bg-green-100', text: 'text-green-800', border: 'border-green-200' },
                '儿童心肺复苏与生命支持': { bg: 'bg-orange-100', text: 'text-orange-800', border: 'border-orange-200' },
                '功能学实验（A类）': { bg: 'bg-teal-100', text: 'text-teal-800', border: 'border-teal-200' },

                '循证临床实践': { bg: 'bg-sky-100', text: 'text-sky-800', border: 'border-sky-200' },

            };
            return colors[title] || { bg: 'bg-gray-100', text: 'text-gray-800', border: 'border-gray-200' };
        };

        // 简易图标组件
        const IconChevronLeft = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6" /></svg>;
        const IconChevronRight = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18l6-6-6-6" /></svg>;
        const IconCalendar = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>;
        const IconList = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="8" y1="6" x2="21" y2="6" /><line x1="8" y1="12" x2="21" y2="12" /><line x1="8" y1="18" x2="21" y2="18" /><line x1="3" y1="6" x2="3.01" y2="6" /><line x1="3" y1="12" x2="3.01" y2="12" /><line x1="3" y1="18" x2="3.01" y2="18" /></svg>;
        const IconClose = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>;
        const IconEdit = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconReset = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;

        const App = () => {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [viewMode, setViewMode] = useState('week');
            const [selectedCourse, setSelectedCourse] = useState(null);
            const [totalVisits, setTotalVisits] = useState(null);

            // 编辑和拖拽状态
            const [isEditing, setIsEditing] = useState(false);
            const [dragInfo, setDragInfo] = useState(null);
            const gridRef = useRef(null);

            // 初始化课程数据 (从 LocalStorage 读取，或者使用原始数据)
            const [courses, setCourses] = useState(() => {
                const saved = localStorage.getItem('medical_schedule_v4');
                if (saved) {
                    try { return JSON.parse(saved); } catch (e) { }
                }
                // 为所有原始数据打上唯一 ID 以便拖拽追踪
                return INITIAL_SCHEDULE_DATA.map((c, i) => ({ ...c, id: `course_${Date.now()}_${i}` }));
            });

            // 当课程数据改变时，自动保存到本地存储
            useEffect(() => {
                localStorage.setItem('medical_schedule_v4', JSON.stringify(courses));
            }, [courses]);

            // 访问计数：优先使用远程持久化计数，失败时回退到本地计数
            useEffect(() => {
                const countApiUrl = 'https://api.countapi.xyz/hit/lanhao99.github.io/medical-schedule-visits';

                fetch(countApiUrl)
                    .then(res => {
                        if (!res.ok) throw new Error('count api request failed');
                        return res.json();
                    })
                    .then(data => {
                        if (typeof data.value === 'number') {
                            setTotalVisits(data.value);
                        } else {
                            throw new Error('invalid count api response');
                        }
                    })
                    .catch(() => {
                        const localKey = 'medical_schedule_local_visits';
                        const currentLocal = Number(localStorage.getItem(localKey) || '0') + 1;
                        localStorage.setItem(localKey, String(currentLocal));
                        setTotalVisits(currentLocal);
                    });
            }, []);

            // 恢复原始数据
            const handleReset = () => {
                if (window.confirm("确定要放弃所有修改，恢复到最原始的课表吗？")) {
                    const freshData = INITIAL_SCHEDULE_DATA.map((c, i) => ({ ...c, id: `course_${Date.now()}_${i}` }));
                    setCourses(freshData);
                    setIsEditing(false);
                }
            };

            const changeDate = (amount) => {
                const newDate = new Date(currentDate);
                if (viewMode === 'month') {
                    newDate.setMonth(newDate.getMonth() + amount);
                } else {
                    newDate.setDate(newDate.getDate() + (amount * 7));
                }
                setCurrentDate(newDate);
            };

            const getYearMonthLabel = () => `${currentDate.getFullYear()}年 ${currentDate.getMonth() + 1}月`;
            const formatYMD = (d) => {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            };

            const monthDays = useMemo(() => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const days = [];

                // 月视图仅展示工作日（周一到周五）
                const firstDisplayDay = new Date(firstDay);
                while (firstDisplayDay.getDay() === 0 || firstDisplayDay.getDay() === 6) {
                    firstDisplayDay.setDate(firstDisplayDay.getDate() + 1);
                }

                const startDayOfWeek = firstDisplayDay.getDay() - 1; // 周一=0, 周五=4
                for (let i = 0; i < startDayOfWeek; i++) days.push(null);

                for (let i = firstDisplayDay.getDate(); i <= lastDay.getDate(); i++) {
                    const d = new Date(year, month, i);
                    const day = d.getDay();
                    if (day === 0 || day === 6) continue;
                    days.push(d);
                }
                return days;
            }, [currentDate]);

            const weekDays = useMemo(() => {
                const dayOfWeek = currentDate.getDay() === 0 ? 6 : currentDate.getDay() - 1;
                const monday = new Date(currentDate);
                monday.setDate(currentDate.getDate() - dayOfWeek);
                const days = [];
                for (let i = 0; i < 5; i++) {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + i);
                    days.push(d);
                }
                return days;
            }, [currentDate]);

            const timeToMinutes = (timeStr) => {
                const [h, m] = timeStr.split(':').map(Number);
                return h * 60 + m;
            };

            const minutesToTime = (min) => {
                const h = Math.floor(min / 60);
                const m = min % 60;
                return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            };

            const START_HOUR = 7.5;
            const END_HOUR = 19;
            const PIXELS_PER_MINUTE = 1.2;

            // ================= 核心：拖拽处理逻辑 =================
            useEffect(() => {
                if (!dragInfo) return;

                const handlePointerMove = (e) => {
                    const deltaY = e.clientY - dragInfo.startY;
                    // 以10分钟为一个拖拽吸附网格
                    const deltaMin = Math.round((deltaY / PIXELS_PER_MINUTE) / 10) * 10;

                    setCourses(prev => prev.map(c => {
                        if (c.id !== dragInfo.id) return c;
                        const newCourse = { ...c };

                        if (dragInfo.type === 'resize') {
                            // 拉伸底部边界：改变结束时间
                            const newEndMin = Math.max(dragInfo.initialStart + 10, dragInfo.initialEnd + deltaMin);
                            newCourse.end = minutesToTime(newEndMin);
                        } else if (dragInfo.type === 'move') {
                            // 拖动主体：改变开始和结束时间
                            const newStartMin = Math.max(START_HOUR * 60, dragInfo.initialStart + deltaMin);
                            const duration = dragInfo.initialEnd - dragInfo.initialStart;
                            newCourse.start = minutesToTime(newStartMin);
                            newCourse.end = minutesToTime(newStartMin + duration);

                            // 如果发生了左右横移，计算跨越的日期列
                            if (gridRef.current) {
                                const gridRect = gridRef.current.getBoundingClientRect();
                                const relativeX = e.clientX - gridRect.left - 64; // 减去左侧时间轴的宽度
                                if (relativeX > 0 && relativeX < gridRect.width - 64) {
                                    const colWidth = (gridRect.width - 64) / weekDays.length;
                                    const colIndex = Math.floor(relativeX / colWidth);
                                    if (colIndex >= 0 && colIndex < weekDays.length) {
                                        newCourse.date = formatYMD(weekDays[colIndex]);
                                    }
                                }
                            }
                        }
                        return newCourse;
                    }));
                };

                const handlePointerUp = () => {
                    setDragInfo(null);
                    document.body.classList.remove('drag-active');
                };

                window.addEventListener('pointermove', handlePointerMove);
                window.addEventListener('pointerup', handlePointerUp);
                document.body.classList.add('drag-active'); // 增加全局拖拽样式防止文字选中

                return () => {
                    window.removeEventListener('pointermove', handlePointerMove);
                    window.removeEventListener('pointerup', handlePointerUp);
                    document.body.classList.remove('drag-active');
                };
            }, [dragInfo, weekDays]);

            return (
                <div className="min-h-screen flex flex-col items-center pt-8 pb-12 px-4 sm:px-8">
                    {/* Header 面板 */}
                    <div className="w-full max-w-6xl glass-panel rounded-2xl shadow-sm border border-gray-100 p-4 sm:p-6 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4">
                            <h1 className="text-2xl font-bold text-gray-800">医学院课表</h1>
                            {isEditing ? (
                                <span className="px-3 py-1 bg-red-50 text-red-600 rounded-full text-sm font-medium animate-pulse border border-red-200">
                                    编辑模式进行中...
                                </span>
                            ) : (
                                <span className="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-sm font-medium">
                                    23级临床八年制
                                </span>
                            )}

                                累计访问 {totalVisits === null ? '加载中...' : totalVisits}
                            </span>
                        </div>

                        <div className="flex items-center gap-4 flex-wrap justify-end">
                            {/* 控制编辑状态 */}
                            <div className="flex gap-2 mr-2">
                                {isEditing && (
                                    <button
                                        onClick={handleReset}
                                        className="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm font-medium text-gray-500 hover:text-red-600 hover:bg-red-50 transition-colors"
                                    >
                                        <IconReset /> 恢复默认
                                    </button>
                                )}
                                <button
                                    onClick={() => {
                                        setIsEditing(!isEditing);
                                        if (viewMode === 'month' && !isEditing) setViewMode('week'); // 编辑只能在周视图
                                    }}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all shadow-sm ${isEditing ? 'bg-green-500 text-white hover:bg-green-600' : 'bg-white border border-gray-200 text-gray-700 hover:bg-gray-50'
                                        }`}
                                >
                                    {isEditing ? '保存修改并退出' : <><IconEdit /> 编辑课表</>}
                                </button>
                            </div>

                            {/* 日期导航 */}
                            <div className="flex items-center bg-gray-50 rounded-lg p-1 border border-gray-200">
                                <button onClick={() => changeDate(-1)} className="p-2 hover:bg-white rounded-md transition-colors"><IconChevronLeft /></button>
                                <span className="w-32 text-center font-semibold text-gray-700">{getYearMonthLabel()}</span>
                                <button onClick={() => changeDate(1)} className="p-2 hover:bg-white rounded-md transition-colors"><IconChevronRight /></button>
                            </div>

                            {/* 视图切换 */}
                            <div className="flex bg-gray-100 rounded-lg p-1 opacity-100">
                                <button
                                    onClick={() => setViewMode('week')}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all ${viewMode === 'week' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                                >
                                    <IconList /> 周视图
                                </button>
                                <button
                                    disabled={isEditing}
                                    onClick={() => setViewMode('month')}
                                    className={`flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all ${isEditing ? 'opacity-40 cursor-not-allowed' : ''} ${viewMode === 'month' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                                    title={isEditing ? "编辑模式下不可用月视图" : ""}
                                >
                                    <IconCalendar /> 月视图
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="w-full max-w-6xl glass-panel rounded-2xl shadow-sm border border-gray-100 overflow-hidden bg-white">

                        {/* ---------------- 月视图 ---------------- */}
                        {viewMode === 'month' && (
                            <div className="p-4 sm:p-6">
                                <div className="grid grid-cols-5 gap-px bg-gray-200 border border-gray-200 rounded-xl overflow-hidden">
                                    {['周一', '周二', '周三', '周四', '周五'].map(day => (
                                        <div key={day} className="bg-gray-50 py-3 text-center text-sm font-semibold text-gray-500">
                                            {day}
                                        </div>
                                    ))}

                                    {monthDays.map((date, idx) => {
                                        if (!date) return <div key={`empty-${idx}`} className="bg-white min-h-[120px]"></div>;

                                        const dateStr = formatYMD(date);
                                        const dayClasses = courses.filter(c => c.date === dateStr);
                                        const isToday = formatYMD(new Date()) === dateStr;

                                        return (
                                            <div key={dateStr} className={`bg-white min-h-[120px] p-2 border-t border-gray-100 transition-colors hover:bg-gray-50 ${isToday ? 'bg-blue-50/30' : ''}`}>
                                                <div className="flex justify-between items-center mb-2">
                                                    <span className={`text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full ${isToday ? 'bg-blue-600 text-white' : 'text-gray-700'}`}>
                                                        {date.getDate()}
                                                    </span>
                                                </div>
                                                <div className="space-y-1.5">
                                                    {dayClasses.map((cls) => {
                                                        const colors = getCourseColors(cls.title);
                                                        return (
                                                            <div
                                                                key={cls.id}
                                                                onClick={() => setSelectedCourse(cls)}
                                                                className={`text-xs p-1.5 rounded-md cursor-pointer border truncate transition-transform hover:scale-[1.02] ${colors.bg} ${colors.text} ${colors.border}`}
                                                                title={`${cls.start}-${cls.end} ${cls.title}`}
                                                            >
                                                                <span className="font-semibold">{cls.title}</span> {cls.start}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* ---------------- 周视图 (支持拖拽编辑) ---------------- */}
                        {viewMode === 'week' && (
                            <div className="flex flex-col h-[800px] overflow-hidden">
                                {/* 周表头 */}
                                <div className="flex border-b border-gray-200 bg-gray-50 z-30 sticky top-0">
                                    <div className="w-16 flex-shrink-0 border-r border-gray-200 flex items-center justify-center text-xs text-gray-400">时间</div>
                                    {weekDays.map(date => {
                                        const dateStr = formatYMD(date);
                                        const isToday = formatYMD(new Date()) === dateStr;
                                        const dayName = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][date.getDay()];

                                        return (
                                            <div key={dateStr} className="flex-1 py-3 text-center border-r border-gray-100 last:border-r-0">
                                                <div className={`text-xs font-medium mb-1 ${isToday ? 'text-blue-600' : 'text-gray-500'}`}>{dayName}</div>
                                                <div className={`text-lg font-semibold w-8 h-8 mx-auto flex items-center justify-center rounded-full ${isToday ? 'bg-blue-600 text-white' : 'text-gray-800'}`}>
                                                    {date.getDate()}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* 时间轴与课程网格 */}
                                <div className="flex-1 overflow-y-auto relative no-scrollbar bg-white">
                                    <div ref={gridRef} className="flex relative" style={{ height: `${(END_HOUR - START_HOUR) * 60 * PIXELS_PER_MINUTE}px` }}>

                                        {/* 左侧时间刻度 */}
                                        <div className="w-16 flex-shrink-0 border-r border-gray-200 relative bg-white z-20">
                                            {Array.from({ length: END_HOUR - START_HOUR + 1 }).map((_, i) => (
                                                <div key={i} className="absolute w-full text-right pr-2 text-xs text-gray-400 -mt-2"
                                                    style={{ top: `${i * 60 * PIXELS_PER_MINUTE}px` }}>
                                                    {Math.floor(START_HOUR + i)}:00
                                                </div>
                                            ))}
                                        </div>

                                        {/* 每天的列与背景网格线 */}
                                        {weekDays.map((date) => {
                                            const dateStr = formatYMD(date);
                                            const dayClasses = courses.filter(c => c.date === dateStr);

                                            return (
                                                <div key={dateStr} className="flex-1 relative border-r border-gray-100 last:border-r-0">
                                                    {/* 水平网格线 */}
                                                    {Array.from({ length: END_HOUR - START_HOUR + 1 }).map((_, i) => (
                                                        <div key={i} className="absolute w-full border-t border-gray-100 pointer-events-none"
                                                            style={{ top: `${i * 60 * PIXELS_PER_MINUTE}px` }}></div>
                                                    ))}

                                                    {/* 当前天的高亮背景 */}
                                                    {formatYMD(new Date()) === dateStr && (
                                                        <div className="absolute inset-0 bg-blue-50/20 pointer-events-none"></div>
                                                    )}

                                                    {/* 渲染课程块 */}
                                                    {dayClasses.map((cls) => {
                                                        const startMin = timeToMinutes(cls.start) - (START_HOUR * 60);
                                                        const duration = timeToMinutes(cls.end) - timeToMinutes(cls.start);
                                                        const topPos = startMin * PIXELS_PER_MINUTE;
                                                        const heightPos = duration * PIXELS_PER_MINUTE;
                                                        const colors = getCourseColors(cls.title);

                                                        const isDraggingThis = dragInfo?.id === cls.id;

                                                        return (
                                                            <div
                                                                key={cls.id}
                                                                onPointerDown={(e) => {
                                                                    if (!isEditing) return;
                                                                    e.stopPropagation();
                                                                    setDragInfo({
                                                                        id: cls.id,
                                                                        type: 'move',
                                                                        startY: e.clientY,
                                                                        startX: e.clientX,
                                                                        initialStart: timeToMinutes(cls.start),
                                                                        initialEnd: timeToMinutes(cls.end)
                                                                    });
                                                                }}
                                                                onClick={() => { if (!isEditing && !dragInfo) setSelectedCourse(cls); }}
                                                                className={`absolute left-1 right-1 rounded-lg border shadow-sm transition-all overflow-hidden flex flex-col
                                                                    ${isEditing ? 'cursor-move ring-1 ring-black/5 hover:ring-blue-400 hover:shadow-md' : 'cursor-pointer hover:shadow-md hover:-translate-y-0.5'}
                                                                    ${isDraggingThis ? 'z-50 shadow-2xl opacity-90 scale-105 transition-none ring-2 ring-blue-500' : 'z-10'}
                                                                    ${colors.bg} ${colors.border} ${colors.text}`}
                                                                style={{ top: `${topPos}px`, height: `${heightPos}px` }}
                                                            >
                                                                {/* 主体信息区 */}
                                                                <div className="p-2 flex-1 pointer-events-none">
                                                                    <div className="text-xs font-semibold opacity-80 mb-0.5">{cls.start} - {cls.end}</div>
                                                                    <div className="text-sm font-bold leading-tight mb-1">{cls.title}</div>
                                                                    {heightPos > 60 && (
                                                                        <div className="text-xs opacity-75 leading-tight truncate">{cls.room}</div>
                                                                    )}
                                                                </div>

                                                                {/* 底部调整长度的把手 (仅编辑模式显示) */}
                                                                {isEditing && (
                                                                    <div
                                                                        onPointerDown={(e) => {
                                                                            e.stopPropagation();
                                                                            setDragInfo({
                                                                                id: cls.id,
                                                                                type: 'resize',
                                                                                startY: e.clientY,
                                                                                startX: e.clientX,
                                                                                initialStart: timeToMinutes(cls.start),
                                                                                initialEnd: timeToMinutes(cls.end)
                                                                            });
                                                                        }}
                                                                        className="h-3 w-full cursor-ns-resize flex items-center justify-center bg-black/5 hover:bg-black/15 transition-colors"
                                                                        title="上下拖动改变课程时长"
                                                                    >
                                                                        <div className="w-8 h-1 rounded-full bg-black/20"></div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 课程详情 Modal (非编辑模式下点击显示) */}
                    {selectedCourse && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm transition-opacity" onClick={() => setSelectedCourse(null)}>
                            <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden transform transition-all" onClick={e => e.stopPropagation()}>
                                <div className={`p-6 border-b ${getCourseColors(selectedCourse.title).bg}`}>
                                    <div className="flex justify-between items-start mb-4">
                                        <div className={`px-2.5 py-1 rounded-md text-xs font-bold border ${getCourseColors(selectedCourse.title).border} ${getCourseColors(selectedCourse.title).text} bg-white/50`}>
                                            课程详情
                                        </div>
                                        <button onClick={() => setSelectedCourse(null)} className="text-gray-500 hover:text-gray-800"><IconClose /></button>
                                    </div>
                                    <h2 className="text-2xl font-bold text-gray-900 mb-1">{selectedCourse.title}</h2>
                                    <p className="text-gray-700 font-medium">{selectedCourse.date}</p>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <p className="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-1">上课时间</p>
                                        <p className="text-gray-800 font-medium text-lg">{selectedCourse.start} <span className="text-gray-400 mx-1">至</span> {selectedCourse.end}</p>
                                    </div>
                                    <div>
                                        <p className="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-1">上课地点</p>
                                        <div className="flex items-center gap-2">
                                            <div className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                            </div>
                                            <p className="text-gray-800 font-medium">{selectedCourse.room}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
