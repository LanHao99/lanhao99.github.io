<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>链接中转站</title>
    <style>
        :root {
            --bg-a: #0f172a;
            --bg-b: #1e293b;
            --bg-c: #0b1023;
            --card: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.24);
            --text: #e2e8f0;
            --muted: #cbd5e1;
            --accent-a: #22d3ee;
            --accent-b: #f59e0b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at 20% 20%, #1d4ed8 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #ea580c 0%, transparent 35%),
                linear-gradient(140deg, var(--bg-c) 0%, var(--bg-a) 40%, var(--bg-b) 100%);
            overflow-x: hidden;
        }

        .noise {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.08;
            background-image: radial-gradient(rgba(255, 255, 255, 0.8) 0.4px, transparent 0.4px);
            background-size: 4px 4px;
            animation: drift 16s linear infinite;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0);
            }

            to {
                transform: translate(-20px, -20px);
            }
        }

        .container {
            width: min(1080px, 92vw);
            margin: 0 auto;
            padding: 56px 0 80px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .back-link {
            color: var(--muted);
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.24);
            padding: 10px 14px;
            border-radius: 12px;
            backdrop-filter: blur(6px);
            transition: 0.25s ease;
        }

        .back-link:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.45);
            transform: translateY(-2px);
        }

        .title-wrap h1 {
            margin: 0;
            font-size: clamp(32px, 5vw, 52px);
            letter-spacing: 0.06em;
        }

        .title-wrap p {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: clamp(14px, 2vw, 18px);
        }

        .grid {
            margin-top: 26px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .entry {
            position: relative;
            border: 1px solid var(--card-border);
            background: var(--card);
            border-radius: 18px;
            text-decoration: none;
            color: inherit;
            padding: 22px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transform: translateY(18px);
            opacity: 0;
            animation: rise 0.6s ease forwards;
        }

        .entry:nth-child(2) {
            animation-delay: 0.14s;
        }

        @keyframes rise {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .entry::before {
            content: "";
            position: absolute;
            inset: -40% auto auto -30%;
            width: 180px;
            height: 180px;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.35), transparent 70%);
            transition: transform 0.35s ease;
        }

        .entry:nth-child(2)::before {
            background: radial-gradient(circle, rgba(245, 158, 11, 0.36), transparent 70%);
        }

        .entry:hover::before {
            transform: scale(1.15);
        }

        .entry:hover {
            border-color: rgba(255, 255, 255, 0.45);
            transform: translateY(-6px);
        }

        .entry-tag {
            display: inline-block;
            font-size: 12px;
            letter-spacing: 0.12em;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.15);
            margin-bottom: 12px;
        }

        .entry h2 {
            margin: 0;
            font-size: 24px;
            line-height: 1.25;
        }

        .entry p {
            margin: 12px 0 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .arrow {
            margin-top: 18px;
            color: #fff;
            font-size: 14px;
            letter-spacing: 0.08em;
        }

        .footer-note {
            margin-top: 28px;
            color: var(--muted);
            font-size: 13px;
        }

        @media (max-width: 640px) {
            .container {
                padding-top: 42px;
            }

            .topbar {
                margin-bottom: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="noise"></div>
    <main class="container">
        <section class="topbar">
            <a class="back-link" href="/">返回主页</a>
            <div class="title-wrap">
                <h1>Links 中转站</h1>
                <p>把常用内容分成独立子页，主页只负责导航。</p>
            </div>
        </section>

        <section class="grid">
            <a class="entry" href="./medical-schedule.html">
                <span class="entry-tag">SUBPAGE 01</span>
                <h2>医学院课表</h2>
                <p>原有课表页面已独立为子页面，继续保留编辑与查看能力。</p>
                <div class="arrow">进入页面 -></div>
            </a>

            <a class="entry" href="./webgal-tutorial.html">
                <span class="entry-tag">SUBPAGE 02</span>
                <h2>WebGal脚本教程</h2>
                <p>从入门到精通的教程内容已并入本站，作为可直接访问的知识子页面。</p>
                <div class="arrow">进入页面 -></div>
            </a>
        </section>

        <p class="footer-note">提示：后续可继续在这里增加更多子页面入口。</p>
    </main>
</body>

</html>
